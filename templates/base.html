<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Buy latest electronics and gadgets online{% endblock %}">
    <title>{% block title %}ElectroStore{% endblock %}</title>

    {% load static %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    {% include 'partials/navbar.html' %}

    <div class="container mt-4">
        {% if messages %}
            <div class="mb-3">
                {% for message in messages %}
                    <div
                        class="alert {% if message.level_tag == 'error' %}alert-danger{% else %}alert-{{ message.tags|default:'info' }}{% endif %} mb-2"
                        role="alert"
                    >
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>

    {% include 'partials/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
document.addEventListener('DOMContentLoaded', function () {

    const stars = document.querySelectorAll('.star');
    const ratingInput = document.getElementById('rating-value');
    const submitBtn = document.getElementById('submit-rating');

    if (!stars.length || !ratingInput) return;

    let currentRating = ratingInput.value || 0;

    function highlightStars(rating) {
        stars.forEach((star, index) => {
            if (index < rating) {
                star.classList.add('active');
            } else {
                star.classList.remove('active');
            }
        });
    }

    // Initial load
    highlightStars(currentRating);

    stars.forEach((star, index) => {

        // Hover effect
        star.addEventListener('mouseover', function () {
            highlightStars(index + 1);
        });

        // Click event
        star.addEventListener('click', function () {
    currentRating = index + 1;
    ratingInput.value = currentRating;
    highlightStars(currentRating);

    if (submitBtn) {
        submitBtn.disabled = false;   // ✅ enable button
    }
});

        // Reset after hover
        star.addEventListener('mouseout', function () {
            highlightStars(currentRating);
            if (submitBtn && currentRating > 0) {
    submitBtn.disabled = false;
}
        });

    });

});
</script>
</body>
</html>
