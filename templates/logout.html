{% extends 'base.html' %}

{% block title %}Logout | ElectroStore{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="logout-card text-center">

      <span style="font-size:3rem; display:block; margin-bottom:1rem;">👋</span>
      <h4 style="font-family:'Syne',sans-serif; margin-bottom:0.5rem;">Leaving so soon?</h4>
      <p class="text-muted mb-4">You can sign back in anytime. See you later!</p>

      <form method="post" action="{% url 'logout' %}" class="d-flex justify-content-center gap-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger" style="padding:12px 28px;">
          Yes, Logout
        </button>
        <a href="{% url 'home' %}" class="btn btn-outline-secondary" style="padding:12px 28px;">
          Stay Here
        </a>
      </form>

    </div>
  </div>
</div>

{% endblock %}
